<h2>Place Order</h2>

<form (ngSubmit)="submit()">
  <input type="text" placeholder="Name" [(ngModel)]="name" name="name" required /><br /><br />
  <input type="text" placeholder="Phone" [(ngModel)]="phone" name="phone" required /><br /><br />
  <textarea placeholder="Address" [(ngModel)]="address" name="address"></textarea><br /><br />
  <button type="submit">Confirm Order (₹{{ cart.getTotal() }})</button>
</form>
